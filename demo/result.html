<main id="app" class="container">
  <section class="panel hero">
    <h1>生成結果</h1>
    <p id="meta"></p>
  </section>

  <section class="panel">
    <div class="actions">
      <a id="downloadPuzzle" class="btn" download="puzzle.png">処理後画像をダウンロード</a>
      <a id="downloadAnswer" class="btn outline" download="answer.png">答え画像をダウンロード</a>
      <a class="btn ghost" href="/demo">別画像でやり直す</a>
    </div>
  </section>

  <section class="panel game">
    <h2>左右の画像を見比べてクリック</h2>
    <p id="progress"></p>
    <div class="pair-grid">
      <div id="stage-left" class="stage">
        <img id="sourceImage" alt="source">
        <div id="markers-left" class="markers"></div>
      </div>
      <div id="stage-right" class="stage">
        <img id="puzzleImage" alt="puzzle">
        <div id="markers-right" class="markers"></div>
      </div>
    </div>
  </section>

  <section class="panel answer">
    <h2>答え</h2>
    <img id="answerImage" alt="answer">
  </section>

  <section class="panel process-steps">
    <h2>処理過程（ステップ表示）</h2>
    <p id="stepMeta" class="muted"></p>

    <div class="step-viewer">
      <img id="stepImage" alt="process-step">
      <div class="step-controls">
        <button id="stepPrev" type="button" class="btn outline">前へ</button>
        <span id="stepIndex"></span>
        <button id="stepNext" type="button" class="btn outline">次へ</button>
      </div>
    </div>

    <div id="stepThumbs" class="step-thumbs"></div>
  </section>

  <section class="panel selection-focus">
    <h2>間違い生成箇所の選定プロセス可視化</h2>
    <p class="muted">各差分で最終採用された領域と、選定時の主要スコア（region_score / background_penalty / naturalness）を確認できます。</p>

    <div class="selection-grid">
      <div class="selection-stage-wrap">
        <div class="stage selection-stage" id="selectionStage">
          <img id="selectionSourceImage" alt="selection-source">
          <div id="selectionOverlay" class="markers"></div>
        </div>
      </div>
      <div class="selection-info">
        <p id="selectionSummary" class="muted"></p>
        <div id="selectionList" class="selection-list"></div>
      </div>
    </div>
  </section>

  <script id="result-data" type="application/json">__RESULT_JSON__</script>
  <script src="/demo-assets/result-v2.js"></script>
</main>
